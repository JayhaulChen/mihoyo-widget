[package]
name = "game-hsr"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
license = "MIT"
description = "Honkai: Star Rail widget data types and API client"

[lib]
name = "game_hsr"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
md-5 = "0.10"
log = "0.4"
chrono = "0.4"
rand = "0.8"
tauri = { version = "2.11.3", features = [] }
tauri-plugin-notification = "2"
rusqlite = { version = "0.31", features = ["bundled"] }
mihoyo-core = { path = "../core" }
