[package]
name = "mihoyo-core"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
license = "MIT"
description = "Shared core for mihoyo game widgets"

[lib]
name = "mihoyo_core"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
md-5 = "0.10"
log = "0.4"
chrono = "0.4"
rusqlite = { version = "0.31", features = ["bundled"] }
dirs = "5"
rand = "0.8"
